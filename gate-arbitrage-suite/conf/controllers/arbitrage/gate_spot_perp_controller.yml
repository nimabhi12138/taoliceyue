# Gate.io Spot-Perpetual Basis Arbitrage Controller Configuration
controller_name: gate_spot_perp_controller
spot_connector: gate_io
perp_connector: gate_io_perpetual

# Trading symbols
symbols:
  - BTC-USDT
  - ETH-USDT
  # - BNB-USDT
  # - SOL-USDT

# Arbitrage parameters (in basis points)
min_basis_bps: 30          # Minimum basis spread to trigger arbitrage (after fees)
slippage_buffer_bps: 5     # Buffer for slippage per leg
safety_margin_bps: 10      # Additional safety margin

# Position sizing
position_size_pct: 0.1     # 10% of available balance per trade
max_position_usd: 10000    # Maximum $10,000 per position
kelly_fraction: 0.25       # Conservative Kelly sizing (25% of full Kelly)

# Rebalancing
rebalance_threshold: 0.02  # Rebalance when delta drift exceeds 2%
auto_rebalance: true       # Enable automatic rebalancing

# Funding rate considerations
funding_lookback_hours: 8  # Look at 8-hour funding periods
max_funding_rate_8h: 0.001 # Max acceptable funding rate (0.1% per 8 hours)

# Risk management
max_open_positions: 3      # Maximum concurrent positions
stop_loss_pct: 0.02       # 2% stop loss
take_profit_pct: 0.01     # 1% take profit

# Execution settings
use_maker_orders: true     # Use post-only orders for lower fees
order_refresh_time: 30     # Refresh orders every 30 seconds
max_retries: 3            # Maximum order placement retries

# Fee configuration (will be overridden by conf_fee_overrides.yml if present)
spot_maker_fee_bps: 2.5    # 0.025% with 75% rebate
spot_taker_fee_bps: 5.0    # 0.05% with 75% rebate
perp_maker_fee_bps: 0.5    # 0.005% with 75% rebate
perp_taker_fee_bps: 1.5    # 0.015% with 75% rebate