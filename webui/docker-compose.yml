version: "3.9"
services:
  backend:
    build:
      context: ./backend
    container_name: gate_arb_backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ..:/workspace  # mount HB root for configs/logs
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: gate_arb_frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    environment:
      - BACKEND_BASE_URL=${BACKEND_BASE_URL:-http://backend:8000}
    depends_on:
      - backend
    restart: unless-stopped

  # Optional Nginx reverse proxy (TLS to be configured via Let's Encrypt)
