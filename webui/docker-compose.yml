version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gate_arb_backend
    ports:
      - "8000:8000"
    environment:
      - HUMMINGBOT_ROOT=/hummingbot
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-password123}
      - LOG_LEVEL=INFO
    volumes:
      - ${HUMMINGBOT_PATH:-../..}:/hummingbot:ro
      - ./backend/logs:/app/logs
    networks:
      - gate_arb_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gate_arb_frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - gate_arb_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: gate_arb_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - gate_arb_network
    restart: unless-stopped
    profiles:
      - with-nginx

  # Redis for caching (optional)
  redis:
    image: redis:alpine
    container_name: gate_arb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gate_arb_network
    restart: unless-stopped
    profiles:
      - with-redis

networks:
  gate_arb_network:
    driver: bridge

volumes:
  redis_data:
    driver: local