# Gate Statistical Pairs Arb Controller (optional)
type: arbitrage_stat_pairs
global_fee_overrides_path: conf/examples/conf_fee_overrides.yml

symbols:
  connector: gate_io
  pair_x: ETH-USDT
  pair_y: BTC-USDT

thresholds:
  entry_z: 2.0
  exit_z: 0.5
  slippage_buffer_bps: 3
  safety_margin_bps: 2

risk:
  per_trade_notional_cap: 1000
  portfolio_notional: 10000

filters:
  lot_step_size: 0.001
  min_notional: 10
  price_tick_size: 0.01

cooldown_seconds: 3

debug_zscore: 0.0
debug_px_x: 3500
debug_px_y: 68000