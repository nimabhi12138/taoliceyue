# Gate.io Arbitrage Suite - Logging Configuration
# Production-grade structured logging

[loggers]
keys=root,arbitrage,fee_model,risk_manager,gate_spot_perp,gate_triangular,gate_spot_spot,gate_stat_arb

[handlers]
keys=consoleHandler,fileHandler,errorHandler,arbitrageHandler

[formatters]
keys=simpleFormatter,detailedFormatter,jsonFormatter

# Loggers
[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_arbitrage]
level=INFO
handlers=arbitrageHandler
qualname=arbitrage
propagate=0

[logger_fee_model]
level=INFO
handlers=arbitrageHandler
qualname=controllers.arbitrage.fee_model
propagate=0

[logger_risk_manager]
level=INFO
handlers=arbitrageHandler
qualname=controllers.arbitrage.risk_manager
propagate=0

[logger_gate_spot_perp]
level=INFO
handlers=arbitrageHandler
qualname=controllers.arbitrage.gate_spot_perp_controller
propagate=0

[logger_gate_triangular]
level=INFO
handlers=arbitrageHandler
qualname=controllers.arbitrage.gate_triangular_controller
propagate=0

[logger_gate_spot_spot]
level=INFO
handlers=arbitrageHandler
qualname=controllers.arbitrage.gate_spot_spot_controller
propagate=0

[logger_gate_stat_arb]
level=INFO
handlers=arbitrageHandler
qualname=controllers.arbitrage.gate_stat_arb_controller
propagate=0

# Handlers
[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailedFormatter
args=('logs/gate_arbitrage.log', 'a', 10485760, 5)

[handler_errorHandler]
class=handlers.RotatingFileHandler
level=ERROR
formatter=detailedFormatter
args=('logs/gate_arbitrage_errors.log', 'a', 10485760, 3)

[handler_arbitrageHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=jsonFormatter
args=('logs/arbitrage_trades.log', 'a', 10485760, 10)

# Formatters
[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(funcName)s() - %(message)s

[formatter_jsonFormatter]
format={"timestamp": "%(asctime)s", "logger": "%(name)s", "level": "%(levelname)s", "module": "%(filename)s", "line": %(lineno)d, "function": "%(funcName)s", "message": "%(message)s"}